<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Farm & Family Alliance | Bronson Family Farm</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f4f7f1;
        color: #18311f;
      }

      .top-banner {
        background: #15311d;
        color: #fff;
        text-align: center;
        padding: 12px;
        font-weight: bold;
      }

      .nav {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 16px 20px;
        background: #fff;
        border-bottom: 1px solid #ddd;
      }

      .nav-links {
        display: flex;
        gap: 14px;
        align-items: center;
        flex-wrap: wrap;
      }

      .nav-cta {
        background: #2d6a3d;
        color: white;
        padding: 10px 16px;
        border-radius: 999px;
        font-weight: bold;
      }

      select {
        padding: 8px;
        border-radius: 6px;
        font-weight: bold;
      }

      .hero {
        padding: 60px 20px;
        text-align: center;
      }

      h1 {
        font-size: 42px;
      }
    </style>
  </head>

  <body>
    <div class="top-banner">
      🌱 Live Demo: Building a community-centered future
    </div>

    <div class="nav">
      <div>
        <strong>Farm & Family Alliance</strong>
      </div>

      <div class="nav-links">
        <span>Experience</span>
        <span>Why This Exists</span>
        <span>Impact</span>
        <span>Partner</span>

        <a class="nav-cta" href="#">Connect Now</a>

        <!-- 🔥 LANGUAGE SELECTOR -->
        <select id="language">
          <option value="en">English</option>
          <option value="es">Spanish</option>
          <option value="it">Italian</option>
          <option value="pw">Patwa</option>
          <option value="he">Hebrew</option>
        </select>
      </div>
    </div>

    <div class="hero">
      <h1 id="headline">
        Growing food, purpose, and possibility from the ground up.
      </h1>
    </div>

    <script>
      const translations = {
        en: "Growing food, purpose, and possibility from the ground up.",
        es: "Cultivando alimentos, propósito y posibilidades desde la tierra.",
        it: "Coltivare cibo, scopo e possibilità dalla terra.",
        pw: "Wi a grow food, purpose, an possibility fram di ground up.",
        he: "מגדלים מזון, מטרה ואפשרויות מהיסוד."
      };

      document.getElementById("language").addEventListener("change", function () {
        const lang = this.value;
        document.getElementById("headline").innerText = translations[lang];
      });
    </script>
  </body>
</html>
